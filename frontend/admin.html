<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Aura Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-top">
            <span class="logo">Dashboard Admin</span>
            <button onclick="sair()" class="btn-acao btn-excluir"><i class="fa fa-sign-out-alt"></i> Sair</button>
        </div>
    </header>

    <main>
        <div class="admin-container">
            <h2 class="section-title"><i class="fa fa-plus-circle"></i> Gerenciar Catálogo</h2>
            
            <form id="formAdmin">
                <input type="hidden" id="idProduto">
                
                <div class="form-group" style="flex-direction: row;">
                    <input type="text" id="nome" placeholder="Nome do Produto *" required style="flex: 2;">
                    <input type="text" id="descricao" placeholder="Descrição curta" style="flex: 2;">
                </div>
                
                <div class="form-group" style="flex-direction: row;">
                    <input type="number" id="preco" step="0.01" placeholder="Preço (Ex: 199.90) *" required style="flex: 1;">
                    <select id="categoria" required style="flex: 1;">
                        <option value="">Categoria *</option>
                        <option value="produto">Produto Eletrônico/Geral</option>
                        <option value="bebida">Bebida</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <input type="url" id="imagem_url" placeholder="URL da Imagem do Produto">
                </div>
                
                <button type="submit" class="btn-primary">Salvar no Banco de Dados</button>
            </form>

            <h2 class="section-title" style="margin-top: 50px;"><i class="fa fa-table"></i> Estoque Atual</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
    <script src="admin.js"></script>
</body>
</html>
