<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Aura Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top" style="justify-content: center;">
            <a href="index.html" class="logo">Aura Market.</a>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h2>Acesso Restrito</h2>
            <p style="margin-bottom: 20px; color: #64748b; font-size: 14px;"></p>
            <form id="formLogin">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Seu e-mail corporativo" required>
                </div>
                <div class="form-group">
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-primary">Entrar no Painel</button>
            </form>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    
    <script src="app.js"></script>
    <script>
        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Usuário e senha definidos para o seu trabalho:
            if(email === 'admin@aura.com' && senha === '1234') {
                localStorage.setItem('logado', 'true'); // Libera a catraca
                mostrarToast('Acesso liberado! Redirecionando...', 'sucesso');
                
                setTimeout(() => {
                    window.location.href = 'admin.html'; // Vai para o painel
                }, 1000);
            } else {
                mostrarToast('E-mail ou senha incorretos!', 'erro');
            }
        });
    </script>
</body>
</html>
